<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokédex</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./styles/overlay.css">
    <link rel="stylesheet" href="./styles/bg_types.css" />
    <link rel="stylesheet" href="./assets/fonts/fonts.css" />
    <link rel="stylesheet" href="./styles/media.css" />
    <link rel="stylesheet" href="./styles/btn.css" />
    <link rel="stylesheet" href="./styles/standard.css" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="shortcut icon" href="./assets/icons/Poké_Ball_icon.svg.png" type="image/x-icon">
  </head>
  <body onload="init()">
 
    <section id="header" class="header">
      <div class="container">
        <div class="row">
          <div class="col-12">
            <div class="header__content">
              <h1 class="header__title"><img src="./assets/imgs/International_Pokémon_logo.svg" alt="" /></h1>
              <p class="header__desc">
                A Pokédex is a handy tool that records information about all the
                Pokémon in the world. It will help you to find and catch them
                all.
              </p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="main" id="main">
      <div class="container">
        <div class="row">
          <div class="col-12">
            <div class="main__content" id="mainContent">
              <div class="main__search d-flex justify-content-center p-3">
                <input
                  type="text"
                  class="main__search-input"
                  placeholder="Search for Pokémon"
                  id="search"
                />

                <button
                  onclick="searchPokemonByName()"
                  class="main__search-btn"
                  id="search-btn"
                >
                  Search
                </button>
                <button
                  onclick="resetPokedex()"
                  class="main__search-btn"
                  id="search-btn"
                >
                  Reset
                </button>
              </div>
              <div class="main__cards" id="pokemonCards"></div>
            </div>
            <div class="btn_container p-3">
              <button onclick="loadMore()" class="btn btn-primary">
                Load More Pokemons
              </button>
            </div>
          </div>
        </div>
      </div>

          <img
        src="./assets/imgs/Pokeball_Animation.svg"
        alt=""
        class="loading_img d_none"
        id="loadingIMG"
      />
    </section>

    <section id="singlePokemon" class="pokemon_overlay"></section>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="./scripts/template.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
